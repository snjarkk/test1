<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,
maximum-scale=1.0, user-scalable=no">
    <title>ARナビ Pro (ボトムUI版)</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow:
hidden; background-color: #000; font-family: -apple-system, sans-serif; }
        #camera-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
object-fit: cover; z-index: 1; }

        /* UIレイヤーを画面下部に固定 */
        #ui-layer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            z-index: 10; color: white; padding: 20px;
            pointer-events: none; box-sizing: border-box;
        }

        .input-form {
            background: rgba(0, 0, 0, 0.85); padding: 15px; border-radius: 16px;
            pointer-events: auto; border: 1px solid rgba(255, 255, 255, 0.3);
            margin-bottom: env(safe-area-inset-bottom); /* iPhoneのホームバー回避 */
        }

        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 11px; margin-bottom: 3px; color: #aaa; }
        select, input { width: 100%; padding: 12px; border-radius: 8px; border:
none; background: #222; color: #fff; font-size: 16px; box-sizing: border-box; }

        #start-btn {
            width: 100%; padding: 16px; background: #007AFF; color: white;
            border: none; border-radius: 10px; font-weight: bold; font-size: 18px;
            margin-top: 5px; box-shadow: 0 4px 12px rgba(0,122,255,0.4);
        }

        #ar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
z-index: 5; pointer-events: none; }
        #target-dot {
            position: absolute; width: 40px; height: 40px;
            background: radial-gradient(circle, #ff2d55 0%, #ff3b30 100%);
            border: 2px solid white; border-radius: 50%;
            transform: translate(-50%, -50%); display: none;
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.8);
        }

        #distance-info {
            position: fixed; top: 60px; left: 0; width: 100%;
            text-align: center; color: white; z-index: 10; pointer-events: none;
        }
        .dist-text { font-size: 36px; font-weight: bold; text-shadow: 0 2px 10px
#000; }
        .alt-text { font-size: 18px; text-shadow: 0 1px 5px #000; background:
rgba(0,0,0,0.3); display: inline-block; padding: 2px 10px; border-radius: 10px; }

        #status-msg { background: rgba(255, 45, 85, 0.9); padding: 12px;
border-radius: 8px; font-size: 14px; margin-top: 10px; display: none;
pointer-events: auto; }
    </style>
</head>
<body>

<video id="camera-view" autoplay playsinline muted></video>

<div id="ar-overlay">
    <div id="target-dot"></div>
</div>

<!--
距離情報は視認性を高めるため上部に移動、または下部のフォームが消えた後に中央付近に表
示 -->
<div id="distance-info">
    <div class="dist-text" id="dist-val"></div>
    <div class="alt-text" id="alt-val"></div>
</div>

<div id="ui-layer">
    <div id="input-ui" class="input-form">
        <div class="input-group">
            <label>平面直角座標系 (1-19系)</label>
            <select id="coord-system">
                <script>
                    for(let i=1; i<=19; i++) {
                        const selected = (i === 15) ? 'selected' : '';
                        document.write(`<option value="${i}"
${selected}>${i}系</option>`);
                    }
                </script>
            </select>
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex:1;">
                <label>X座標 (北正)</label>
                <input type="number" id="target-x" placeholder="0.00" step="0.001">
            </div>
            <div class="input-group" style="flex:1;">
                <label>Y座標 (東正)</label>
                <input type="number" id="target-y" placeholder="0.00" step="0.001">
            </div>
        </div>
        <div class="input-group">
            <label>標高 Z (m) ※任意</label>
            <input type="number" id="target-z" value="0" step="0.001">
        </div>
        <button id="start-btn">ナビゲーション開始</button>
        <div id="status-msg"></div>
    </div>
</div>

<script>
    const video = document.getElementById('camera-view');
    const startBtn = document.getElementById('start-btn');
    const targetDot = document.getElementById('target-dot');
    const distVal = document.getElementById('dist-val');
    const altVal = document.getElementById('alt-val');
    const statusMsg = document.getElementById('status-msg');

    let state = { currentPos: null, targetLatLng: null, targetZ: 0, heading: 0,
pitch: 0, active: false };

    function showError(msg) {
        statusMsg.innerText = msg;
        statusMsg.style.display = 'block';
    }

    function jprToLatLng(x, y, system) {
        const origins = [
            [33, 129.5], [33, 131], [36, 132.166666666], [33, 133.5], [36,
134.333333333], [36, 136], [36, 137.166666666], [36, 138.5],
            [36, 139.833333333], [40, 140.833333333], [44, 140.25], [44, 142.25],
[44, 144.25], [26, 142], [26, 127.5], [26, 124],
            [26, 131], [20, 136], [26, 154]
        ];
        const org = origins[system - 1];
        const phi0 = org[0] * Math.PI / 180, lam0 = org[1] * Math.PI / 180;
        const m0 = 0.9999, a = 6378137, f = 1 / 298.257222101;
        const n = f / (2 - f), ap = a * (1 + n) / (1 + n * n / 4 + n * n * n * n /
64);
        const beta = [null, (1/2)*n - (2/3)*n*n + (37/96)*n*n*n, (1/48)*n*n +
(1/15)*n*n*n, (17/480)*n*n*n];
        const delta = [null, 2*n - (2/3)*n*n - 2*n*n*n, (7/3)*n*n - (8/5)*n*n*n,
(56/15)*n*n*n];
        let xi = x / (m0 * ap), et = y / (m0 * ap);
        for (let j = 1; j <= 3; j++) {
            xi -= beta[j] * Math.sin(2 * j * x / (m0 * ap)) * Math.cosh(2 * j * y /
(m0 * ap));
            et -= beta[j] * Math.cos(2 * j * x / (m0 * ap)) * Math.sinh(2 * j * y /
(m0 * ap));
        }
        const chi = Math.asin(Math.sin(xi) / Math.cosh(et));
        let phi = chi;
        for (let j = 1; j <= 3; j++) phi += delta[j] * Math.sin(2 * j * chi);
        return { lat: phi * 180 / Math.PI, lng: (lam0 + Math.atan(Math.sinh(et) /
Math.cos(xi))) * 180 / Math.PI };
    }

    startBtn.addEventListener('click', async () => {
        statusMsg.style.display = 'none';
        try {
            // iOS許可
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof
DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res !== 'granted') throw new
Error("センサーの許可が必要です。");
            }

            const x = parseFloat(document.getElementById('target-x').value);
            const y = parseFloat(document.getElementById('target-y').value);
            const z = parseFloat(document.getElementById('target-z').value) || 0;
            const sys = parseInt(document.getElementById('coord-system').value);
            if (isNaN(x) || isNaN(y)) throw new
Error("座標を正しく入力してください。");

            state.targetLatLng = jprToLatLng(x, y, sys);
            state.targetZ = z;

            const stream = await navigator.mediaDevices.getUserMedia({ video: {
facingMode: 'environment' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => video.play();

            navigator.geolocation.watchPosition(p => {
                state.currentPos = { lat: p.coords.latitude, lng:
p.coords.longitude, alt: p.coords.altitude || 0 };
                update();
            }, e => showError("GPSエラー: " + e.message), { enableHighAccuracy: true
});

            window.addEventListener('deviceorientation', e => {
                state.heading = e.webkitCompassHeading || (360 - e.alpha);
                state.pitch = e.beta;
                update();
            }, true);

            document.getElementById('input-ui').style.display = 'none';
            state.active = true;
        } catch (err) {
            showError(err.message);
        }
    });

    function update() {
        if (!state.active || !state.currentPos) return;
        const p1 = state.currentPos, p2 = state.targetLatLng;
        const R = 6371000;
        const dLat = (p2.lat - p1.lat) * Math.PI / 180;
        const dLon = (p2.lng - p1.lng) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(p1.lat*Math.PI/180) *
Math.cos(p2.lat*Math.PI/180) * Math.sin(dLon/2)**2;
        const distH = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        const distV = state.targetZ - p1.alt;
        const distTotal = Math.sqrt(distH**2 + distV**2);

        distVal.innerText = `目標まで約${distTotal.toFixed(2)}m`;
        altVal.innerText = `高低差: ${distV > 0 ? '+' : ''}${distV.toFixed(2)}m`;

        const y1 = p1.lat * Math.PI / 180, y2 = p2.lat * Math.PI / 180, dL = (p2.lng
- p1.lng) * Math.PI / 180;
        const brng = (Math.atan2(Math.sin(dL)*Math.cos(y2),
Math.cos(y1)*Math.sin(y2)-Math.sin(y1)*Math.cos(y2)*Math.cos(dL)) * 180 / Math.PI +
360) % 360;

        let diffH = brng - state.heading;
        if (diffH > 180) diffH -= 360; if (diffH < -180) diffH += 360;
        const pitchRad = Math.atan2(distV, distH) * 180 / Math.PI;
        let diffV = pitchRad - (state.pitch - 90);

        const fovH = 60, fovV = 80;
        if (Math.abs(diffH) < fovH/2 && Math.abs(diffV) < fovV/2) {
            targetDot.style.left = `${(50 + (diffH / fovH) * 100)}%`;
            targetDot.style.top = `${(50 - (diffV / fovV) * 100)}%`;
            targetDot.style.display = 'block';
            const size = Math.max(15, Math.min(120, 1500 / (Math.sqrt(distTotal) +
1)));
            targetDot.style.width = targetDot.style.height = `${size}px`;
        } else {
            targetDot.style.display = 'none';
        }
    }
</script>
</body>
</html>
