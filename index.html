<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,
maximum-scale=1.0, user-scalable=no">
    <title>AR座標ナビ</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
Helvetica, Arial, sans-serif;
        }

        #camera-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            color: white;
            padding: 20px;
            pointer-events: none;
        }

        .input-form {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            pointer-events: auto;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .input-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 12px;
            margin-bottom: 4px;
            color: #ccc;
        }

        select, input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            background: #fff;
            color: #000;
            box-sizing: border-box;
            font-size: 16px; /* iOSでズームされないための最小サイズ */
        }

        #start-btn {
            width: 100%;
            padding: 14px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #ar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        #target-dot {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(255, 45, 85, 0.9);
            border: 3px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            box-shadow: 0 0 20px rgba(255, 45, 85, 0.6);
        }

        /* ドットの中に中心点 */
        #target-dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        #distance-info {
            position: fixed;
            bottom: 50px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            z-index: 10;
            letter-spacing: 1px;
        }

        #status-msg {
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            margin-top: 10px;
            text-align: center;
            color: #eee;
        }
    </style>
</head>
<body>

<!-- カメラ映像表示 -->
<video id="camera-view" autoplay playsinline></video>

<!-- ARドット表示レイヤー -->
<div id="ar-overlay">
    <div id="target-dot"></div>
</div>

<!-- 操作・入力レイヤー -->
<div id="ui-layer">
    <div id="input-ui" class="input-form">
        <div class="input-group">
            <label>平面直角座標系 (1-19系)</label>
            <select id="coord-system">
                <script>
                    for(let i=1; i<=19; i++) {
                        document.write(`<option value="${i}">${i}系</option>`);
                    }
                </script>
            </select>
        </div>
        <div class="input-group">
            <label>X座標 (北向き正)</label>
            <input type="number" id="target-x" placeholder="例: -35000.00"
step="0.001">
        </div>
        <div class="input-group">
            <label>Y座標 (東向き正)</label>
            <input type="number" id="target-y" placeholder="例: 12000.00"
step="0.001">
        </div>
        <button id="start-btn">ナビゲーション開始</button>
        <div id="status-msg">平面直角座標を入力してください。</div>
    </div>
</div>

<!-- 距離表示 -->
<div id="distance-info"></div>

<script>
    const video = document.getElementById('camera-view');
    const startBtn = document.getElementById('start-btn');
    const targetDot = document.getElementById('target-dot');
    const distanceInfo = document.getElementById('distance-info');
    const statusMsg = document.getElementById('status-msg');

    let currentPos = null;
    let targetLatLng = null;
    let currentHeading = 0;
    let isActive = false;

    /**
     * 日本の平面直角座標 (X, Y) を緯度経度に変換
     * ガウス・クリューゲル投影（逆計算）
     */
    function jprToLatLng(x, y, system) {
        // 原点緯度・経度 (JGD2011/2000)
        const origins = [
            [33, 129.5], [33, 131.0], [36, 132.166666666], [33, 133.5],
            [36, 134.333333333], [36, 136.0], [36, 137.166666666], [36, 138.5],
            [36, 139.833333333], [40, 140.833333333], [44, 140.25], [44, 142.25],
            [44, 142.25], [26, 142.0], [26, 127.5], [26, 124.0], //
13系は重複定義注意だが一般値を採用
            [26, 131.0], [20, 136.0], [26, 154.0]
        ];

        const origin = origins[system - 1];
        const phi0 = origin[0] * Math.PI / 180;
        const lambda0 = origin[1] * Math.PI / 180;

        const m0 = 0.9999;
        const a = 6378137.0;
        const f = 1 / 298.257222101;

        const n = f / (2 - f);
        const a_prime = a * (1 + n) / (1 + n * n / 4 + n * n * n * n / 64);

        const beta = [
            null,
            (1/2)*n - (2/3)*n*n + (37/96)*n*n*n,
            (1/48)*n*n + (1/15)*n*n*n,
            (17/480)*n*n*n
        ];

        const delta = [
            null,
            2*n - (2/3)*n*n - 2*n*n*n,
            (7/3)*n*n - (8/5)*n*n*n,
            (56/15)*n*n*n
        ];

        const xi = x / (m0 * a_prime);
        const eta = y / (m0 * a_prime);

        let xi_prime = xi;
        let eta_prime = eta;

        for (let j = 1; j <= 3; j++) {
            xi_prime -= beta[j] * Math.sin(2 * j * xi) * Math.cosh(2 * j * eta);
            eta_prime -= beta[j] * Math.cos(2 * j * xi) * Math.sinh(2 * j * eta);
        }

        const chi = Math.asin(Math.sin(xi_prime) / Math.cosh(eta_prime));

        let phi = chi;
        for (let j = 1; j <= 3; j++) {
            phi += delta[j] * Math.sin(2 * j * chi);
        }

        const lambda = lambda0 + Math.atan(Math.sinh(eta_prime) /
Math.cos(xi_prime));

        return {
            lat: phi * 180 / Math.PI,
            lng: lambda * 180 / Math.PI
        };
    }

    /**
     * 2地点間の距離 (m)
     */
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
    }

    /**
     * 現在地から目的地の方位角 (0-360)
     */
    function getBearing(lat1, lon1, lat2, lon2) {
        const phi1 = lat1 * Math.PI / 180;
        const phi2 = lat2 * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const y = Math.sin(dLon) * Math.cos(phi2);
        const x = Math.cos(phi1) * Math.sin(phi2) -
                  Math.sin(phi1) * Math.cos(phi2) * Math.cos(dLon);
        return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    /**
     * アプリ起動処理
     */
    async function init() {
        const x = parseFloat(document.getElementById('target-x').value);
        const y = parseFloat(document.getElementById('target-y').value);
        const system = parseInt(document.getElementById('coord-system').value);

        if (isNaN(x) || isNaN(y)) {
            alert("X座標とY座標を数値で入力してください。");
            return;
        }

        targetLatLng = jprToLatLng(x, y, system);
        statusMsg.innerText = "準備中...";

        // カメラ起動
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' },
                audio: false
            });
            video.srcObject = stream;
        } catch (err) {
            alert("カメラへのアクセスを許可してください。");
            return;
        }

        // iOS センサー許可
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response !== 'granted') {
                    alert("方位センサーの利用を許可してください。");
                    return;
                }
            } catch (err) {
                console.error(err);
            }
        }

        // GPS監視開始
        navigator.geolocation.watchPosition(
            (pos) => {
                currentPos = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude
                };
                updateDisplay();
            },
            (err) => {
                statusMsg.innerText = "位置情報エラー: " + err.message;
            },
            { enableHighAccuracy: true }
        );

        // 方位監視開始
        window.addEventListener('deviceorientation', (e) => {
            if (e.webkitCompassHeading !== undefined) {
                currentHeading = e.webkitCompassHeading; // iOS
            } else if (e.alpha !== null) {
                currentHeading = 360 - e.alpha; // Android等
            }
            updateDisplay();
        }, true);

        document.getElementById('input-ui').style.display = 'none';
        isActive = true;
        statusMsg.innerText = "案内中";
    }

    /**
     * 画面更新（ARドットと距離）
     */
    function updateDisplay() {
        if (!currentPos || !targetLatLng || !isActive) return;

        const distance = getDistance(currentPos.lat, currentPos.lng,
targetLatLng.lat, targetLatLng.lng);
        const bearing = getBearing(currentPos.lat, currentPos.lng, targetLatLng.lat,
targetLatLng.lng);

        distanceInfo.innerText = `目標まで約${distance.toFixed(2)}m`;

        // 目的地方位とスマホの向きの差分
        let diff = bearing - currentHeading;
        if (diff > 180) diff -= 360;
        if (diff < -180) diff += 360;

        // 視野角 (FOV) 設定（標準的なスマホカメラは約60度）
        const fov = 60;
        const screenWidth = window.innerWidth;

        if (Math.abs(diff) < fov / 2) {
            // 画面内の左右位置を計算
            const xPos = (screenWidth / 2) + (diff * (screenWidth / fov));
            targetDot.style.left = `${xPos}px`;
            targetDot.style.top = `50%`;
            targetDot.style.display = 'block';

            // 距離に応じたサイズ変更 (20px〜120px)
            const size = Math.max(20, Math.min(120, 1500 / (Math.sqrt(distance) +
1)));
            targetDot.style.width = `${size}px`;
            targetDot.style.height = `${size}px`;
        } else {
            targetDot.style.display = 'none';
        }
    }

    startBtn.addEventListener('click', init);
</script>

</body>
</html>
